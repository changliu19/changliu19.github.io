name: Update Google Scholar metrics

# Refreshes citations / h-index in profile.json from Google Scholar (via SerpAPI).
on:
  schedule:
    - cron: "0 3 * * 1"      # every Monday 03:00 UTC
  workflow_dispatch:           # plus a manual "Run workflow" button

permissions:
  contents: write              # allow the job to commit the updated profile.json

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch metrics and update profile.json
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scripts/update_scholar.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain profile.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add profile.json
            git commit -m "chore: update Scholar metrics [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
