  <style>
    :root{ --spring:cubic-bezier(.34,1.56,.64,1); }
    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; }
    ::selection{ background:#ffe795; color:#1b1a17; }
    ::-moz-selection{ background:#ffe795; color:#1b1a17; }
    body{
      background:
        radial-gradient(circle at 18% 0%, rgba(138,28,28,.055), transparent 28rem),
        linear-gradient(180deg, #fbfaf7 0%, #f8f5ee 100%);
      color:#1b1a17;
      font-family:'IBM Plex Sans',system-ui,sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    a{ color:#8a1c1c; text-decoration:none; }

    .wrap{ max-width:780px; margin:0 auto; padding:72px 28px 80px; }

    /* header */
    .header{ display:flex; gap:30px; align-items:flex-start; flex-wrap:wrap; }
    .photo{
      position:relative; width:128px; height:160px; flex:none; border-radius:4px; overflow:visible;
      background:#efeae1; box-shadow:0 10px 26px rgba(51,49,44,.08); cursor:pointer;
      transition:transform .25s ease, box-shadow .25s ease;
    }
    .photo:hover{ transform:rotate(-2.5deg) scale(1.03); box-shadow:0 16px 34px rgba(51,49,44,.13); }
    .photo.shake{ animation:photo-shake .55s var(--spring); }
    .photo.knocked{
      pointer-events:none;
      animation:photo-knocked .95s cubic-bezier(.17,.84,.44,1) both;
      transform-origin:18% 18%;
    }
    .photo.knocked img,
    .photo.knocked .placeholder{
      animation:photo-squash .95s cubic-bezier(.17,.84,.44,1) both;
      transform-origin:50% 18%;
    }
    .photo img{ width:128px; height:160px; object-fit:cover; display:block; border-radius:4px; transition:transform .5s ease; }
    .photo:hover img{ transform:scale(1.035); }
    .photo .placeholder{
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      text-align:center; border-radius:4px;
      background:repeating-linear-gradient(135deg,#efeae1,#efeae1 7px,#e7e1d6 7px,#e7e1d6 14px);
      font-family:'IBM Plex Mono',monospace; font-size:10px; color:#9a9183;
      letter-spacing:.05em; padding:8px; line-height:1.5;
    }
    .photo-pop{
      position:absolute; top:-13px; right:-13px; z-index:3;
      width:32px; height:32px; border-radius:50%;
      background:#fff; border:1px solid #e6d3d0; box-shadow:0 2px 6px rgba(27,26,23,.14);
      display:flex; align-items:center; justify-content:center;
      font-size:17px; line-height:1; pointer-events:none;
      animation:pill-pop .5s var(--spring) both;
    }
    .photo-hit{
      position:absolute; top:-24px; left:88px; z-index:5;
      font-size:28px; line-height:1; pointer-events:none;
      filter:drop-shadow(0 3px 3px rgba(27,26,23,.18));
      animation:photo-hit .58s var(--spring) both;
      transform-origin:20% 80%;
    }
    .head-info{ flex:1; min-width:260px; }
    h1.name{ margin:0; font-size:30px; font-weight:600; letter-spacing:-.01em; line-height:1.15; }
    h1.name .zh{ color:#9a9183; font-weight:400; font-size:22px; }
    .title{ margin-top:8px; font-size:16px; color:#33312c; line-height:1.5; }
    .affiliation{ margin-top:3px; font-size:14.5px; color:#6f6a60; line-height:1.55; }
    .areas{ margin-top:12px; font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.06em; color:#8a1c1c; text-transform:uppercase; }
    nav.links{ margin-top:16px; display:flex; flex-wrap:wrap; gap:8px; }
    nav.links a{
      position:relative; display:inline-flex; align-items:center; font-family:'IBM Plex Mono',monospace;
      font-size:12px; letter-spacing:.03em; color:#33312c; border:1px solid #ddd6ca;
      border-radius:999px; padding:5px 13px; transition:border-color .18s ease, color .18s ease, background .18s ease, transform .18s ease;
    }
    nav.links a:hover{ border-color:#8a1c1c; color:#8a1c1c; background:#fffdfa; transform:translateY(-1px); }
    nav.links a .pill-badge{
      position:absolute; top:-10px; right:-8px; z-index:2;
      width:21px; height:21px; border-radius:50%;
      background:#fff; border:1px solid #e6d3d0; box-shadow:0 2px 6px rgba(27,26,23,.14);
      display:flex; align-items:center; justify-content:center;
      font-size:11px; line-height:1; opacity:0; transform:scale(0); pointer-events:none;
    }
    nav.links a:hover .pill-badge{ opacity:1; animation:pill-pop .5s var(--spring) both; }

    /* section labels */
    section{ margin-top:44px; }
    .label{ font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#8a1c1c; font-weight:600; margin-bottom:14px; }

    /* prospective callout */
    section.prospective{ position:relative; overflow:visible; }
    .prospective-inner{
      position:relative; overflow:hidden;
      background:#f4efe6; border:1px solid #e9e1d3; border-radius:8px; padding:24px 26px;
      box-shadow:0 14px 34px rgba(51,49,44,.055);
    }
    .prospective-inner::after{
      content:''; position:absolute; inset:0 auto 0 -45%; width:38%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.36), transparent);
      transform:skewX(-18deg); animation:sweep 8s ease-in-out infinite;
      pointer-events:none;
    }
    section.prospective .label{ margin-bottom:10px; }
    section.prospective .prose hr{ border:none; height:1px; background:#e0d5c0; margin:20px 0; }

    /* sticky note */
    .sticky-note{
      position:absolute; top:-18px; right:18px; z-index:4;
      max-width:250px; transform:rotate(3deg);
      background:linear-gradient(180deg,#ffefae,#ffe795);
      padding:11px 17px 12px; box-shadow:0 4px 10px rgba(27,26,23,.14);
      font-family:'Long Cang','IBM Plex Sans',cursive; font-size:21px; line-height:1.35;
      color:#5b4636; border-bottom:none;
      transition:transform .2s var(--spring);
    }
    .sticky-note:hover{ transform:rotate(0) scale(1.04); color:#5b4636; }
    .sticky-note .sticky-tape{
      position:absolute; top:-8px; left:50%; width:46px; height:17px; margin-left:-23px;
      background:rgba(255,255,255,.5); transform:rotate(-2deg);
    }

    /* publications */
    .pub-head{ display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:6px; }
    .pub-head .label{ margin-bottom:0; }
    .metrics{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#8d877b; }
    .metrics a{ color:#8d877b; border-bottom:1px solid #d8d2c6; }
    .pub-list{ display:flex; flex-direction:column; }
    .pub{ position:relative; display:grid; grid-template-columns:96px 1fr; gap:18px; padding:16px 0; border-top:1px solid #ece8e0; transition:background .16s ease; }
    .pub::before{
      content:"";
      position:absolute;
      left:-10px;
      top:14px;
      bottom:14px;
      width:3px;
      background:rgba(138,28,28,.42);
      opacity:0;
      transform:scaleY(.7);
      transform-origin:center;
      transition:opacity .16s ease, transform .16s ease;
      pointer-events:none;
    }
    .pub:hover{ background:rgba(255,255,255,.46); }
    .pub:hover::before{ opacity:1; transform:scaleY(1); }
    .pub-meta{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; line-height:1.5; padding-top:2px; }
    .pub-venue{ color:#8a1c1c; font-weight:500; }
    .pub-award{ display:inline-block; margin-top:5px; background:#8a1c1c; color:#fff; padding:1px 7px; border-radius:3px; font-size:10px; letter-spacing:.04em; }
    .pub-title{ font-size:15.5px; font-weight:600; line-height:1.4; color:#1b1a17; }
    .pub-authors{ margin-top:4px; font-size:13.5px; color:#6f6a60; line-height:1.5; }
    .pub-links{ margin-top:7px; display:flex; gap:8px; flex-wrap:wrap; }
    .pub-links a{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.03em; color:#8a1c1c; border:1px solid #e0d2cf; border-radius:3px; padding:2px 8px; transition:background .14s ease, color .14s ease, transform .14s ease; }
    .pub-links a:hover{ background:#8a1c1c; color:#fff; transform:translateY(-1px); }
    .pub-foot{ margin-top:16px; font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#8d877b; }
    .pub-foot a{ border-bottom:1px solid #d8d2c6; }
    .pub-note{ margin-top:12px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#8d877b; }
    .corr-mark{ color:#8a1c1c; font-weight:600; margin-left:1px; }

    /* contact */
    .contact-grid{ display:grid; grid-template-columns:88px 1fr; gap:8px 16px; font-size:14.5px; color:#33312c; line-height:1.5; }
    .contact-key{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#8d877b; padding-top:2px; text-transform:uppercase; letter-spacing:.06em; }
    .contact-grid a{ border-bottom:1px solid rgba(138,28,28,.25); }

    /* footer */
    footer{ margin-top:60px; padding-top:20px; border-top:1px solid #ece8e0; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#a39b8d; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; }

    /* prose (markdown) */
    .prose{ font-size:16px; line-height:1.72; color:#33312c; }
    .prose p{ margin:0 0 14px; }
    .prose strong{ color:#1b1a17; font-weight:600; }
    .prose a{ color:#8a1c1c; border-bottom:1px solid rgba(138,28,28,.25); }
    .prose a:hover{ border-bottom-color:#8a1c1c; }
    .prose h3{ font-size:12px; letter-spacing:.12em; text-transform:uppercase; font-family:'IBM Plex Mono',monospace; color:#8a1c1c; font-weight:600; margin:24px 0 10px; }
    .prose ul{ margin:0 0 14px; padding:0; list-style:none; }
    .prose li{ position:relative; padding:4px 0 4px 18px; }
    .prose li::before{ content:''; position:absolute; left:2px; top:13px; width:5px; height:5px; border-radius:50%; background:#c9b9a3; }
    .news .prose li{ padding-left:0; }
    .news .prose li::before{ display:none; }
    .news .prose ul{ display:flex; flex-direction:column; }
    .news .prose li{ display:block; border-top:1px solid #ece8e0; padding:11px 0; line-height:1.6; }
    .news .prose li:first-child{ border-top:none; }
    .news .prose li strong:first-child{ font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:#8a1c1c; margin-right:6px; }

    .animate-in{ animation:fadeUp .52s cubic-bezier(.2,.7,.2,1) both; }
    .reveal{
      opacity:0;
      transform:translateY(14px);
      transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1);
      transition-delay:var(--delay, 0ms);
    }
    .pub.reveal{
      transition:
        opacity .5s ease,
        transform .5s cubic-bezier(.2,.7,.2,1),
        background .16s ease;
      transition-delay:var(--delay, 0ms), var(--delay, 0ms), 0ms;
    }
    .reveal.is-visible{ opacity:1; transform:translateY(0); }

    @keyframes fadeUp{
      from{ opacity:0; transform:translateY(16px); }
      to{ opacity:1; transform:translateY(0); }
    }
    @keyframes sweep{
      0%, 68%{ transform:translateX(0) skewX(-18deg); }
      100%{ transform:translateX(430%) skewX(-18deg); }
    }
    @keyframes pill-pop{
      0%{ transform:scale(0) rotate(-40deg); }
      55%{ transform:scale(1.25) rotate(10deg); }
      75%{ transform:scale(.92) rotate(-5deg); }
      100%{ transform:scale(1) rotate(0); }
    }
    @keyframes photo-shake{
      0%{ transform:rotate(0deg); }
      20%{ transform:rotate(-4deg); }
      40%{ transform:rotate(4deg); }
      60%{ transform:rotate(-3deg); }
      80%{ transform:rotate(2deg); }
      100%{ transform:rotate(0deg); }
    }
    @keyframes photo-hit{
      0%{ opacity:0; transform:translate(-18px,-18px) rotate(-34deg) scale(.72); }
      24%{ opacity:1; transform:translate(0,0) rotate(0deg) scale(1.1); }
      100%{ opacity:0; transform:translate(18px,18px) rotate(24deg) scale(.86); }
    }
    @keyframes photo-knocked{
      0%{ transform:translate(0,0) rotate(0deg) scale(1); }
      12%{ transform:translate(-7px,3px) rotate(-7deg) scale(1.02); }
      30%{ transform:translate(26px,-18px) rotate(18deg) scale(1); }
      62%{ transform:translate(112px,42px) rotate(68deg) scale(.94); opacity:1; }
      86%{ transform:translate(156px,126px) rotate(102deg) scale(.82); opacity:0; }
      100%{ transform:translate(156px,126px) rotate(102deg) scale(.82); opacity:0; }
    }
    @keyframes photo-squash{
      0%, 100%{ transform:scale(1); }
      12%{ transform:scale(1.08,.92); }
      30%{ transform:scale(.94,1.06); }
      86%{ transform:scale(.88); }
    }

    /* back-to-top cat */
    .to-top{
      position:fixed; right:24px; bottom:24px; z-index:50;
      width:46px; height:46px; border-radius:50%; padding:0;
      background:#fff; border:1px solid #e6d3d0; box-shadow:0 2px 6px rgba(27,26,23,.14);
      display:flex; align-items:center; justify-content:center;
      font-size:22px; line-height:1; cursor:pointer;
      opacity:0; transform:scale(0); pointer-events:none;
      transition:opacity .18s ease, box-shadow .18s ease, transform .18s var(--spring);
    }
    .to-top.show{
      opacity:1; transform:scale(1); pointer-events:auto;
      animation:pill-pop .5s var(--spring);
    }
    .to-top.show:hover{ transform:translateY(-3px) rotate(-6deg); box-shadow:0 8px 18px rgba(27,26,23,.24); }

    @media (prefers-reduced-motion: reduce){
      *, *::before, *::after{
        animation-duration:.001ms !important;
        animation-iteration-count:1 !important;
        scroll-behavior:auto !important;
        transition-duration:.001ms !important;
      }
      .reveal{ opacity:1; transform:none; }
      .photo:hover, .photo:hover img, nav.links a:hover, .pub:hover, .pub-links a:hover,
      .sticky-note, .sticky-note:hover, .to-top.show:hover{ transform:none; }
    }
  </style>

<body>
  <main class="wrap" id="app"></main>

  <script>
    const ME = 'Chang Liu';

    async function get(path) {
      try { const r = await fetch(path); if (!r.ok) throw 0; return await r.text(); }
      catch (e) { return ''; }
    }

    function md(t) {
      if (!window.marked || !t) return '';
      try { return window.marked.parse(t); } catch (e) { return ''; }
    }

    function clean(s) { return (s || '').replace(/[{}]/g, '').trim(); }

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    function linkEmoji(label) {
      const s = (label || '').toLowerCase().trim();
      if (s.includes('scholar')) return '🎓';
      if (s.includes('email')) return '💌';
      if (s.includes('cv')) return '📄';
      if (s.includes('github')) return '🐙';
      if (s.includes('twitter') || s === 'x') return '🐦';
      if (s.includes('linkedin')) return '💼';
      if (s.includes('faculty') || s.includes('home')) return '🏫';
      return '✨';
    }

    function pickLinkEmoji(label, overrides) {
      const map = overrides || {};
      const target = (label || '').toLowerCase().trim();
      const key = Object.keys(map).find(k => k.toLowerCase().trim() === target);
      if (key && map[key]) return map[key];
      return linkEmoji(label);
    }

    function parseBib(src) {
      if (!src || !window.bibtexParse) return [];
      let entries = [];
      try { entries = window.bibtexParse.toJSON(src); } catch (e) { return []; }
      return entries
        .filter(e => e.entryType && e.entryType.toLowerCase() !== 'comment' && e.entryTags)
        .map(e => {
          const t = e.entryTags;
          const authors = clean(t.author).replace(/\s+and\s+/g, ', ');
          const flag = (v) => clean(v).toLowerCase() === ME.toLowerCase()
            || /^(true|yes|1)$/i.test(clean(v));
          const isCorresponding = flag(t.corresponding);
          const isCoFirst = flag(t.cofirst);
          let marks = '';
          if (isCoFirst) marks += '<sup class="corr-mark">*</sup>';
          if (isCorresponding) marks += '<sup class="corr-mark">&dagger;</sup>';
          const meBold = '<strong style="color:#1b1a17;font-weight:600;">' + ME + '</strong>' + marks;
          const authorsHtml = escapeHtml(authors)
            .replace(new RegExp(escapeRegExp(ME), 'g'), meBold);
          const links = [];
          if (t.pdf) links.push({ label: 'PDF', url: t.pdf });
          if (t.code) links.push({ label: 'Code', url: t.code });
          if (t.project) links.push({ label: 'Project', url: t.project });
          if (t.arxiv) links.push({ label: 'arXiv', url: t.arxiv });
          return {
            key: e.citationKey,
            title: clean(t.title),
            authorsHtml,
            venue: clean(t.venue) || clean(t.booktitle) || clean(t.journal),
            year: parseInt(t.year, 10) || 0,
            award: clean(t.award),
            corresponding: isCorresponding,
            cofirst: isCoFirst,
            links
          };
        })
        .sort((a, b) => b.year - a.year);
    }

    function photoHtml(profile) {
      const photo = (profile && profile.photo) || 'assets/profile.jpg';
      return '<img src="' + escapeHtml(photo) + '" alt="' +
             escapeHtml((profile && profile.name) || '') + '">';
    }

    function sectionShown(sections, key) { return (sections || {})[key] !== false; }

    function emailAddress(p) {
      return (p.emailUser && p.emailDomain) ? (p.emailUser + '@' + p.emailDomain) : '';
    }

    function render(profile, content, pubs) {
      const p = profile || {};
      const sections = p.sections || {};
      const links = p.links || {};
      const linkEmojis = p.linkEmojis || {};
      const email = emailAddress(p);
      const linkList = Object.keys(links).filter(k => links[k]).map(k =>
        links[k] === true ? { label: k, url: email ? 'mailto:' + email : '#' } : { label: k, url: links[k] });
      const scholarUrl = links['Google Scholar'] || '#';
      const m = p.metrics || {};
      const hasMetrics = !!(m.citations || m.hindex);
      const citations = m.citations ? Number(m.citations).toLocaleString() : '';
      const areas = (p.areas || []).join('  ·  ');

      let html = '';

      // header
      html += '<header class="header">';
      html += '  <div class="photo">' + photoHtml(p) + '</div>';
      html += '  <div class="head-info">';
      html += '    <h1 class="name">' + escapeHtml(p.name || '') +
              ' <span class="zh">' + escapeHtml(p.nameZh || '') + '</span></h1>';
      html += '    <div class="title">' + escapeHtml(p.title || '') + '</div>';
      html += '    <div class="affiliation">' + escapeHtml(p.affiliation || '') + '</div>';
      html += '    <div class="areas">' + escapeHtml(areas) + '</div>';
      html += '    <nav class="links">';
      for (const lk of linkList) {
        html += '<a href="' + escapeHtml(lk.url) + '" target="_blank" rel="noopener">' +
                escapeHtml(lk.label) +
                '<span class="pill-badge" aria-hidden="true">' + pickLinkEmoji(lk.label, linkEmojis) + '</span></a>';
      }
      html += '    </nav>';
      html += '  </div>';
      html += '</header>';

      // about
      if (sectionShown(sections, 'about')) {
        html += '<section><div class="label">About</div>' +
                '<div class="prose">' + md(content.about) + '</div></section>';
      }

      // prospective
      if (sectionShown(sections, 'prospective')) {
        const noteText = (p.stickyNote || '').trim();
        const note = (noteText && email)
          ? '<a class="sticky-note" href="mailto:' + escapeHtml(email) +
            '" aria-label="' + escapeHtml(noteText) + '">' +
            '<span class="sticky-tape" aria-hidden="true"></span>' + escapeHtml(noteText) + '</a>'
          : '';
        html += '<section class="prospective">' + note +
                '<div class="prospective-inner"><div class="label">Prospective Students</div>' +
                '<div class="prose">' + md(content.prospective) + '</div></div></section>';
      }

      // news
      if (sectionShown(sections, 'news')) {
        html += '<section class="news"><div class="label" style="margin-bottom:6px;">News</div>' +
                '<div class="prose">' + md(content.news) + '</div></section>';
      }

      // publications
      if (sectionShown(sections, 'publications')) {
        html += '<section>';
        html += '  <div class="pub-head">';
        html += '    <div class="label">Selected Publications</div>';
        if (hasMetrics) {
          html += '    <div class="metrics">' + escapeHtml(citations) +
                  ' citations &middot; h-index ' + escapeHtml(String(m.hindex || '')) +
                  ' &middot; <a href="' + escapeHtml(scholarUrl) +
                  '" target="_blank" rel="noopener">Google Scholar</a></div>';
        }
        html += '  </div>';
        html += '  <div class="pub-list">';
        for (const pub of pubs) {
          html += '<div class="pub">';
          html += '  <div class="pub-meta">';
          html += '    <div class="pub-venue">' + escapeHtml(pub.venue) + '</div>';
          if (pub.award) html += '<div class="pub-award">' + escapeHtml(pub.award) + '</div>';
          html += '  </div>';
          html += '  <div>';
          html += '    <div class="pub-title">' + escapeHtml(pub.title) + '</div>';
          html += '    <div class="pub-authors">' + pub.authorsHtml + '</div>';
          if (pub.links.length) {
            html += '    <div class="pub-links">';
            for (const l of pub.links) {
              html += '<a href="' + escapeHtml(l.url) + '" target="_blank" rel="noopener">' +
                      escapeHtml(l.label) + '</a>';
            }
            html += '    </div>';
          }
          html += '  </div>';
          html += '</div>';
        }
        html += '  </div>';
        const anyCoFirst = pubs.some(pub => pub.cofirst);
        const anyCorr = pubs.some(pub => pub.corresponding);
        if (anyCoFirst || anyCorr) {
          const parts = [];
          if (anyCoFirst) parts.push('<sup class="corr-mark">*</sup> Co-first author');
          if (anyCorr) parts.push('<sup class="corr-mark">&dagger;</sup> Corresponding author');
          html += '  <div class="pub-note">' + parts.join('&nbsp;&nbsp;&middot;&nbsp;&nbsp;') + '</div>';
        }
        html += '  <div class="pub-foot">Full list on <a href="' + escapeHtml(scholarUrl) +
                '" target="_blank" rel="noopener">Google Scholar &rarr;</a></div>';
        html += '</section>';
      }

      // awards
      if (sectionShown(sections, 'awards')) {
        html += '<section><div class="label" style="margin-bottom:10px;">Honors &amp; Awards</div>' +
                '<div class="prose">' + md(content.awards) + '</div></section>';
      }

      // service
      if (sectionShown(sections, 'service')) {
        html += '<section><div class="label" style="margin-bottom:10px;">Academic Service</div>' +
                '<div class="prose">' + md(content.service) + '</div></section>';
      }

      // contact
      if (sectionShown(sections, 'contact')) {
        html += '<section><div class="label" style="margin-bottom:12px;">Contact</div>';
        html += '  <div class="contact-grid">';
        html += '    <div class="contact-key">Email</div>';
        html += '    <div><a href="mailto:' + escapeHtml(email) + '">' +
                escapeHtml(email) + '</a></div>';
        html += '    <div class="contact-key">Office</div>';
        html += '    <div>' + escapeHtml(p.office || '') + '</div>';
        html += '  </div>';
        html += '</section>';
      }

      // footer
      html += '<footer><span>&copy; 2026 ' + escapeHtml(p.name || '') +
              '</span><span>Updated June 2026</span></footer>';

      document.getElementById('app').innerHTML = html;
      enhanceMotion();
      enhanceEasterEggs(p);
    }

    function enhanceEasterEggs(profile) {
      const app = document.getElementById('app');
      const cfgEmojis = (profile && Array.isArray(profile.photoEmojis)) ? profile.photoEmojis : [];
      const photoEmojis = cfgEmojis.filter(e => typeof e === 'string' && e.trim());
      const emojis = photoEmojis.length ? photoEmojis : ['👋', '😆', '🤓', '☕', '🎉', '🐱'];

      // photo: click to shake + pop a random emoji badge
      const photo = app.querySelector('.photo');
      if (photo) {
        photo.title = '点我一下 :)';
        let photoClickCount = 0;
        // fall back to the placeholder if the photo is missing / fails to load
        const img = photo.querySelector('img');
        const showPlaceholder = () => {
          if (!photo.querySelector('.placeholder')) {
            photo.insertAdjacentHTML('afterbegin',
              '<div class="placeholder">drop photo &rarr; assets/profile.jpg</div>');
          }
          if (img) img.remove();
        };
        if (img) {
          if (img.complete && img.naturalWidth === 0) showPlaceholder();
          else img.addEventListener('error', showPlaceholder);
        }
        photo.addEventListener('animationend', (e) => {
          if (e.animationName === 'photo-shake') photo.classList.remove('shake');
        });
        photo.addEventListener('click', () => {
          if (photo.classList.contains('knocked')) return;
          photoClickCount += 1;
          photo.classList.remove('shake');
          void photo.offsetWidth; // restart the animation on rapid clicks
          if (photoClickCount >= 6) {
            photoClickCount = 0;
            photo.classList.add('knocked');
            const hit = document.createElement('span');
            hit.className = 'photo-hit';
            hit.textContent = '🔨';
            photo.appendChild(hit);
            setTimeout(() => hit.remove(), 900);
          } else {
            photo.classList.add('shake');
          }
          const pop = document.createElement('span');
          pop.className = 'photo-pop';
          pop.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          photo.appendChild(pop);
          setTimeout(() => pop.remove(), 1200);
        });
      }

      // back-to-top cat
      if (!document.querySelector('.to-top')) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'to-top';
        btn.title = '回到顶部';
        btn.textContent = '🐈';
        btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        document.body.appendChild(btn);
        const onScroll = () => { btn.classList.toggle('show', window.scrollY > 360); };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
      }
    }

    function enhanceMotion() {
      const app = document.getElementById('app');
      const reduceMotion = window.matchMedia &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const header = app.querySelector('.header');
      if (header) header.classList.add('animate-in');

      const revealItems = [...app.querySelectorAll('section, .pub')];
      revealItems.forEach((el, i) => {
        el.classList.add('reveal');
        el.style.setProperty('--delay', Math.min(i * 42, 260) + 'ms');
      });

      if (reduceMotion || !('IntersectionObserver' in window)) {
        revealItems.forEach(el => el.classList.add('is-visible'));
        return;
      }

      const observer = new IntersectionObserver((entries) => {
        for (const entry of entries) {
          if (!entry.isIntersecting) continue;
          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target);
        }
      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });

      revealItems.forEach(el => observer.observe(el));
    }

    async function main() {
      const [profileTxt, about, news, awards, service, prospective, bib] = await Promise.all([
        get('profile.json'), get('content/about.md'), get('content/news.md'),
        get('content/awards.md'), get('content/service.md'),
        get('content/prospective.md'), get('publications.bib')
      ]);

      let profile = {};
      try { profile = JSON.parse(profileTxt); } catch (e) {}

      const content = { about, news, awards, service, prospective };
      const pubs = parseBib(bib);

      render(profile, content, pubs);
    }

    main();
  </script>
